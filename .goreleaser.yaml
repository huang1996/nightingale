version: 2

before:
  hooks:
    - go mod tidy
    - go install github.com/rakyll/statik

snapshot:
  name_template: '{{ .Tag }}-SNAPSHOT-{{ .ShortCommit }}'

checksum:
  name_template: 'checksums.txt'

changelog:
  disable: true

builds:
  - id: build
    hooks:
      pre:
      - cmd: sh -x ./fe.sh
        output: true
    main: ./cmd/center/
    binary: n9e
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ccfos/nightingale/v6/pkg/version.Version={{ .Tag }}-{{.Commit}}
  - id: build-cli
    main: ./cmd/cli/
    binary: n9e-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ccfos/nightingale/v6/pkg/version.Version={{ .Tag }}-{{.Commit}}
  - id: build-edge
    main: ./cmd/edge/
    binary: n9e-edge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ccfos/nightingale/v6/pkg/version.Version={{ .Tag }}-{{.Commit}}

archives:
  - id: n9e
    builds:
      - build
      - build-cli
      - build-edge
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "n9e-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    wrap_in_directory: false
    files:
      - docker/*
      - etc/*
      - integrations/*
      - cli/*
      - n9e.sql

release:
  github:
    owner: ccfos
    name: nightingale
  name_template: "v{{ .Version }}"

dockers:
  - image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:latest-amd64"
    goos: linux
    goarch: amd64
    ids:
      - build
    dockerfile: docker/Dockerfile.goreleaser
    extra_files:
      - etc
      - integrations
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
  
  - image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:{{ .Version }}-arm64v8"
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:latest-arm64v8"
    goos: linux
    goarch: arm64
    ids:
      - build
    dockerfile: docker/Dockerfile.goreleaser.arm64
    extra_files:
      - etc
      - integrations
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
  
  - image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:latest-amd64"
    goos: linux
    goarch: amd64
    ids:
      - build-edge
    dockerfile: docker/Dockerfile.goreleaser.edge
    extra_files:
      - etc
      - integrations
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
  
  - image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:{{ .Version }}-arm64v8"
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:latest-arm64v8"
    goos: linux
    goarch: arm64
    ids:
      - build-edge
    dockerfile: docker/Dockerfile.goreleaser.edge.arm64
    extra_files:
      - etc
      - integrations
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"

docker_manifests:
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:{{ .Version }}-arm64v8"

  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:latest"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:latest-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/nightingale:latest-arm64v8"

  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:{{ .Version }}-arm64v8"

  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:latest"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:latest-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/n9e-edge:latest-arm64v8"
